<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .joke-display {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.2em;
            color: #555;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-setup {
            font-size: 1.1em;
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .joke-delivery {
            font-size: 1.1em;
            color: #667eea;
            font-weight: 600;
            margin-top: 15px;
        }

        .button-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:active {
            transform: translateY(-1px);
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-copy {
            background: #e9ecef;
            color: #333;
            flex: 0 1 auto;
        }

        .btn-copy:hover {
            background: #dee2e6;
        }

        .loading {
            display: none;
            color: #667eea;
            font-weight: 600;
            font-size: 1.1em;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #e74c3c;
        }

        .success {
            color: #27ae60;
            font-size: 0.9em;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success.show {
            opacity: 1;
        }

        .joke-type {
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
            text-transform: capitalize;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .joke-text {
                font-size: 1em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="joke-display" id="jokeDisplay">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading a hilarious joke...</p>
            </div>
            <div class="joke-text" id="jokeText">
                Click the button below to get a random joke!
            </div>
        </div>

        <div class="joke-type" id="jokeType"></div>

        <div class="button-container">
            <button class="btn-generate" id="generateBtn" onclick="getJoke()">Get a Joke</button>
            <button class="btn-copy" id="copyBtn" onclick="copyJoke()" style="display: none;">Copy</button>
        </div>

        <div class="success" id="successMessage">✓ Copied to clipboard!</div>
        <div class="error" id="errorMessage" style="display: none;"></div>
    </div>

    <script>
        let currentJoke = '';

        async function getJoke() {
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const jokeText = document.getElementById('jokeText');
            const jokeType = document.getElementById('jokeType');
            const errorMessage = document.getElementById('errorMessage');
            const copyBtn = document.getElementById('copyBtn');

            // Show loading state
            generateBtn.disabled = true;
            loading.style.display = 'block';
            jokeText.innerHTML = '';
            jokeType.innerHTML = '';
            errorMessage.style.display = 'none';
            copyBtn.style.display = 'none';

            try {
                // Fetch joke from JokeAPI
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Hide loading state
                loading.style.display = 'none';

                // Display joke based on type
                if (data.type === 'twopart') {
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                    jokeText.innerHTML = `
                        <div>
                            <div class="joke-setup">${data.setup}</div>
                            <div class="joke-delivery">${data.delivery}</div>
                        </div>
                    `;
                } else {
                    currentJoke = data.joke;
                    jokeText.innerHTML = `<div>${data.joke}</div>`;
                }

                jokeType.innerHTML = `${data.category} • ${data.type === 'twopart' ? 'Setup & Punchline' : 'Single'}`;
                copyBtn.style.display = 'inline-block';

            } catch (error) {
                loading.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = `❌ Error: ${error.message}. Please try again!`;
                console.error('Error fetching joke:', error);
            } finally {
                generateBtn.disabled = false;
            }
        }

        function copyJoke() {
            if (!currentJoke) return;

            navigator.clipboard.writeText(currentJoke).then(() => {
                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy joke to clipboard');
            });
        }

        // Load a joke when the page loads
        window.addEventListener('load', () => {
            getJoke();
        });

        // Allow Enter key to generate new joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getJoke();
            }
        });
    </script>
</body>
</html>
